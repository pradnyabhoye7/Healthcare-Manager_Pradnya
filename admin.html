<div class="portal-box">
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Admin</title>
</head>
<body>

<h2>Admin Portal</h2>

<input type="text" id="doctorName"
placeholder="Enter Doctor Name">

<button onclick="addDoctor()">Add Doctor</button>

<h3>Doctors</h3>

<div id="doctorList"></div>

<a href="index.html">
<button>Home</button>
</a>

<input type="text" id="doctorName"
placeholder="Doctor Name">

<input type="text" id="specialization"
placeholder="Specialization">

<button onclick="addDoctor()">
Add Doctor
</button>

<h3>Doctors</h3>
<div id="doctorList"></div>

<h3>Doctor Leave</h3>

<input type="text"
id="leaveDoctor"
placeholder="Doctor Name">

<button onclick="markLeave()">
Mark On Leave
</button>

<h3>Dashboard</h3>

<p id="doctorCount"></p>
<p id="patientCount"></p>
<p id="appointmentCount"></p>

<script>

let doctors =
JSON.parse(localStorage.getItem("doctors")) || [];

let leaveDoctors =
JSON.parse(localStorage.getItem("leaveDoctors")) || [];

function addDoctor(){

let name =
document.getElementById("doctorName").value;

let specialization =
document.getElementById("specialization").value;

doctors.push({
name:name,
specialization:specialization
});

localStorage.setItem(
"doctors",
JSON.stringify(doctors)
);

showDoctors();
updateDashboard();
}

function markLeave(){

let doctor =
document.getElementById("leaveDoctor").value;

leaveDoctors.push(doctor);

localStorage.setItem(
"leaveDoctors",
JSON.stringify(leaveDoctors)
);

alert("Doctor Marked On Leave");
}

function showDoctors(){

let list =
document.getElementById("doctorList");

list.innerHTML="";

doctors.forEach(doc=>{

list.innerHTML += `
<div class="card">
${doc.name}
<br>
${doc.specialization}
</div>
`;

});

}

function updateDashboard(){

let appointments =
JSON.parse(localStorage.getItem("appointments")) || [];

let patients =
new Set(
appointments.map(a=>a.patient)
);

document.getElementById("doctorCount").innerHTML =
"Total Doctors : " + doctors.length;

document.getElementById("patientCount").innerHTML =
"Total Patients : " + patients.size;

document.getElementById("appointmentCount").innerHTML =
"Total Appointments : " + appointments.length;
}

showDoctors();
updateDashboard();

</script>

</body>
</html>
   
</div>
