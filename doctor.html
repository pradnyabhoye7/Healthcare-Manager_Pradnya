<div class="portal-box">

<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Doctor</title>
</head>
<body>

<h2>Doctor Portal</h2>
<select id="doctorFilter"
onchange="showAppointments()">
</select>

<div id="appointmentList"></div>

<textarea
id="notes"
placeholder="Enter Notes">
</textarea>

<button onclick="generateSummary()">
Generate Patient Summary
</button>

<div id="patientSummary"></div>

<a href="index.html">
<button>Home</button>
</a>

<script>

let doctors =
JSON.parse(localStorage.getItem("doctors")) || [];

let dropdown =
document.getElementById("doctorFilter");

doctors.forEach(doc=>{

dropdown.innerHTML += `
<option>
${doc.name}
</option>
`;

});

function showAppointments(){

let doctor =
dropdown.value;

let appointments =
JSON.parse(
localStorage.getItem("appointments")
) || [];

let list =
document.getElementById("appointmentList");

list.innerHTML="";

appointments.forEach(app=>{

if(app.doctor === doctor){

list.innerHTML += `
<div class="card">
Patient : ${app.patient}
<br>
Date : ${app.date}
<br>
Urgency : ${app.urgency}
</div>
`;

}

});

}

function generateSummary(){

let summary =
"Please take medicines as prescribed and follow up after 3 days.";

document.getElementById("patientSummary").innerHTML =
`
<div class="card">
${summary}
</div>
`;

}

showAppointments();

</script>

</body>
</html>
</div>
